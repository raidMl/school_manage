<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Classrooms | School System Admin</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>body{font-family:'Inter',sans-serif}.card-panel{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;max-width:860px}</style>
</head>
<body data-page="classrooms">
<div id="sidebar-placeholder"></div>
<div class="sb-main">
<div id="header-placeholder"></div>
<div class="sb-content">
<div class="sb-breadcrumb"><i class="fa fa-home"></i> <a href="index.html">Home</a> <span>/</span> <a href="index.html">Home</a> <span>/</span> <span>Classrooms</span></div>

<div class="row">
  <div class="col-lg-4 col-md-5 col-sm-12">
    <div class="card-panel" style="max-width:none">
      <h3 style="margin:0 0 16px;font-size:16px;font-weight:700"><i class="fa fa-plus-circle" style="color:#4f6eff"></i> Add Classroom</h3>
      <div id="backend-classroom-form-status" class="alert" style="display:none"></div>
      <form id="backend-add-classroom-form">
        <div class="form-group"><label>Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" placeholder="e.g. Room A-101" required></div>
        <div class="form-group"><label>Capacity</label><input type="number" name="capacity" class="form-control" placeholder="e.g. 30" min="1"></div>
        <div class="form-group"><label>Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
        <button type="submit" class="btn btn-primary btn-block"><i class="fa fa-save"></i> Save Classroom</button>
      </form>
    </div>
  </div>
  <div class="col-lg-8 col-md-7 col-sm-12">
    <div class="card-panel" style="max-width:none">
      <h3 style="margin:0 0 16px;font-size:16px;font-weight:700">All Classrooms</h3>
      <div id="backend-classrooms-status" class="alert" style="display:none"></div>
      <div class="table-responsive">
        <table id="backend-classrooms-table" class="table table-striped table-hover table-bordered">
          <thead><tr><th>#</th><th>Name</th><th>Capacity</th><th>Description</th><th width="80">Actions</th></tr></thead>
          <tbody><tr><td colspan="5" class="text-center">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
</div></div>
<script src="js/vendor/jquery-1.12.4.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/components.js"></script>
<script src="js/backend.js"></script>
</body></html>
