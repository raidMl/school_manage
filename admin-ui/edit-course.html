<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Formation | School System Admin</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>body{font-family:'Inter',sans-serif}.card-panel{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;max-width:860px}</style>
</head>
<body data-page="courses">
<div id="sidebar-placeholder"></div>
<div class="sb-main">
<div id="header-placeholder"></div>
<div class="sb-content">
<div class="sb-breadcrumb"><i class="fa fa-home"></i> <a href="index.html">Home</a> <span>/</span> <a href="all-courses.html">Formations</a> <span>/</span> <span>Edit</span></div>

<div class="card-panel">
  <h3 style="margin:0 0 4px;font-size:17px;font-weight:700"><i class="fa fa-edit" style="color:#3498db"></i> Edit Formation</h3>
  <p style="color:#888;font-size:13px;margin:0 0 20px">Update formation details.</p>
  <div id="backend-form-status" class="alert" style="display:none"></div>
  <form id="backend-edit-formation-form" novalidate>
    <div class="form-group"><label>Title <span class="text-danger">*</span></label><input type="text" name="title" class="form-control" required></div>
    <div class="form-group"><label>Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>Assign Teacher</label><select id="formation-teacher-id" name="teacher_id" class="form-control"><option value="">Loading...</option></select></div></div>
      <div class="col-md-6"><div class="form-group"><label>Image URL</label><input type="url" name="image" class="form-control"></div></div>
    </div>
    <div class="row">
      <div class="col-md-4"><div class="form-group"><label>Duration (hours)</label><input type="number" name="duration_hours" class="form-control"></div></div>
      <div class="col-md-4"><div class="form-group"><label>Price ($)</label><input type="number" name="price" class="form-control" step="0.01"></div></div>
    </div>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>Start Date</label><input type="date" name="start_date" class="form-control"></div></div>
      <div class="col-md-6"><div class="form-group"><label>End Date</label><input type="date" name="end_date" class="form-control"></div></div>
    </div>
    <div class="form-group" style="margin-top:20px">
      <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-save"></i> Update Formation</button>
      <a href="all-courses.html" class="btn btn-default btn-lg" style="margin-left:10px"><i class="fa fa-arrow-left"></i> Back</a>
    </div>
  </form>
</div>

<div id="footer-placeholder"></div>
</div></div>
<script src="js/vendor/jquery-1.12.4.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/components.js"></script>
<script src="js/backend.js"></script>
</body></html>
