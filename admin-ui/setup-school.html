<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>School Settings | School System Admin</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>body{font-family:'Inter',sans-serif}.card-panel{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;max-width:860px}</style>
</head>
<body data-page="settings">
<div id="sidebar-placeholder"></div>
<div class="sb-main">
<div id="header-placeholder"></div>
<div class="sb-content">
<div class="sb-breadcrumb"><i class="fa fa-home"></i> <a href="index.html">Home</a> <span>/</span> <span>Settings</span> <span>/</span> <span>School Configuration</span></div>

<div class="card-panel">
  <h3 style="margin:0 0 4px;font-size:17px;font-weight:700"><i class="fa fa-cog" style="color:#a18cd1"></i> School Settings</h3>
  <p style="color:#888;font-size:13px;margin:0 0 20px">Update your school profile and configuration.</p>
  
  <form id="backend-setup-school-form" novalidate>
    <div class="form-group">
      <label>School Name <span class="text-danger">*</span></label>
      <input type="text" name="name" id="name" class="form-control" placeholder="Example Academy" required>
    </div>
    <div class="form-group">
      <label>Logo URL</label>
      <input type="url" name="logo" id="logo" class="form-control" placeholder="https://...">
    </div>
    <div id="backend-setup-status" class="help-block small" style="color:#e74c3c"></div>
    <div class="form-group" style="margin-top:20px">
      <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-save"></i> Save Settings</button>
    </div>
  </form>
</div>

<div id="footer-placeholder"></div>
</div></div>
<script src="js/vendor/jquery-1.12.4.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/components.js"></script>
<script src="js/backend.js"></script>
</body></html>
