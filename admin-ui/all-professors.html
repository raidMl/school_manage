<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Teachers | School System Admin</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>body{font-family:'Inter',sans-serif}.card-panel{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px}</style>
</head>
<body data-page="professors">
    <div id="sidebar-placeholder"></div>
    <div class="sb-main">
        <div id="header-placeholder"></div>
        <div class="sb-content">
            <div class="sb-breadcrumb">
                <i class="fa fa-home"></i>
                <a href="index.html">Home</a>
                <span>/</span>
                <span>Teachers</span>
            </div>
        <div class="card-panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <div>
                    <h3 style="margin:0;font-size:16px;font-weight:700">Teachers List</h3>
                    <p style="margin:4px 0 0;color:#888;font-size:13px">All registered teachers from the database.</p>
                </div>
                <a href="add-professor.html" class="btn btn-success btn-sm"><i class="fa fa-plus"></i> Add Teacher</a>
            </div>
            <div id="backend-teachers-status" class="alert" style="display:none"></div>
            <div class="table-responsive">
                <table id="backend-teachers-table" class="table table-striped table-hover table-bordered">
                    <thead><tr>
                        <th width="50">Photo</th><th>Emp #</th><th>Name</th>
                        <th>Email</th><th>Speciality</th><th>Hire Date</th><th width="80">Actions</th>
                    </tr></thead>
                    <tbody><tr><td colspan="7" class="text-center">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>
    <script src="js/vendor/jquery-1.12.4.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/backend.js"></script>
</body>
</html>
