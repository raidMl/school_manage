<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Student | School System Admin</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>body{font-family:'Inter',sans-serif}.card-panel{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;max-width:860px}</style>
</head>
<body data-page="students">
<div id="sidebar-placeholder"></div>
<div class="sb-main">
<div id="header-placeholder"></div>
<div class="sb-content">
<div class="sb-breadcrumb"><i class="fa fa-home"></i> <a href="index.html">Home</a> <span>/</span> <a href="all-students.html">Students</a> <span>/</span> <span>Edit</span></div>

<div class="card-panel">
  <h3 style="margin:0 0 4px;font-size:17px;font-weight:700"><i class="fa fa-edit" style="color:#3498db"></i> Edit Student</h3>
  <p style="color:#888;font-size:13px;margin:0 0 20px">Update student details.</p>
  <div id="backend-form-status" class="alert" style="display:none"></div>
  <form id="backend-edit-student-form" novalidate>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>First Name</label><input type="text" name="first_name" class="form-control"></div></div>
      <div class="col-md-6"><div class="form-group"><label>Last Name</label><input type="text" name="last_name" class="form-control"></div></div>
    </div>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>Email</label><input type="email" name="email" class="form-control"></div></div>
      <div class="col-md-6"><div class="form-group"><label>Status</label><select name="is_active" class="form-control"><option value="1">Active</option><option value="0">Inactive</option></select></div></div>
    </div>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>Gender</label><select name="gender" class="form-control"><option value="">Select</option><option value="MALE">Male</option><option value="FEMALE">Female</option></select></div></div>
      <div class="col-md-6"><div class="form-group"><label>Formation</label><select id="student-formation-id" name="formation_id" class="form-control"><option value="">Loading formations...</option></select></div></div>
    </div>
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label>Payment Status</label>
          <select name="payment_status" class="form-control">
            <option value="not_paid">Not Paid</option>
            <option value="paid">Paid</option>
          </select>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-group">
          <label>Promo Code</label>
          <select id="student-promo-code" name="promo_code" class="form-control">
            <option value="">No promo code</option>
          </select>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12" id="subscription-plan-group" style="display:none">
        <div class="form-group">
          <label>Subscription Plan <span class="text-danger">*</span></label>
          <select name="subscription_plan" class="form-control">
            <option value="">Select plan</option>
            <option value="1_month">Per Month (1 Month)</option>
            <option value="3_months">Per 3 Months</option>
            <option value="1_year">Per Year (12 Months)</option>
          </select>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12"><div class="form-group"><label>Enrollment Date</label><input type="date" name="enrollment_date" class="form-control"></div></div>
    </div>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>Parent Name</label><input type="text" name="parent_name" class="form-control"></div></div>
      <div class="col-md-6"><div class="form-group"><label>Parent Phone</label><input type="tel" name="parent_phone" class="form-control"></div></div>
    </div>
    <div class="row">
      <div class="col-md-6"><div class="form-group"><label>Birth Date</label><input type="date" name="birth_date" class="form-control"></div></div>
      <div class="col-md-6"><div class="form-group"><label>Photo URL</label><input type="url" name="photo" class="form-control"></div></div>
    </div>
    <div class="form-group" style="margin-top:20px">
      <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-save"></i> Update Student</button>
      <a href="all-students.html" class="btn btn-default btn-lg" style="margin-left:10px"><i class="fa fa-arrow-left"></i> Back</a>
    </div>
  </form>
</div>

<div id="footer-placeholder"></div>
</div></div>
<script src="js/vendor/jquery-1.12.4.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/components.js"></script>
<script src="js/backend.js"></script>
</body></html>
