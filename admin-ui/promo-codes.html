<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promo Codes | School System Admin</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        body{font-family:'Inter',sans-serif;background:#f5f7fb}
        .card-panel{background:#fff;border-radius:16px;padding:22px;box-shadow:0 2px 14px rgba(15,23,42,.06);margin-bottom:20px}
        .promo-card{background:linear-gradient(135deg,#f8fbff 0%,#ffffff 100%);border:1px solid #e7eef8;border-radius:14px;padding:16px}
        .promo-badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
        .promo-badge.active{background:#e8f8ef;color:#1d7a45}
        .promo-badge.inactive{background:#fce7e7;color:#b42318}
        .promo-pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef4ff;color:#3456d6;font-size:12px;font-weight:600}
        .table thead th{background:#f8fafc;border-bottom:0;font-size:13px;font-weight:700;color:#475569}
        .table tbody td{vertical-align:middle}
    </style>
</head>
<body data-page="courses">
    <div id="sidebar-placeholder"></div>
    <div class="sb-main">
        <div id="header-placeholder"></div>
        <div class="sb-content">
            <div class="sb-breadcrumb">
                <i class="fa fa-home"></i>
                <a href="index.html">Home</a>
                <span>/</span>
                <span>Promo Codes</span>
            </div>
            
            <div class="card-panel promo-card" style="margin-bottom: 20px;">
                <h3 style="margin:0 0 10px;font-size:16px;font-weight:700"><i class="fa fa-tag" style="color:#4f46e5"></i> Generate Promo Code</h3>
                <p style="margin:0 0 14px;color:#64748b;font-size:13px">Create discounts for a specific formation or subscription plan.</p>
                <form id="backend-add-promo-form" class="row">
                    <div class="col-md-3">
                        <div class="form-group">
                            <label>Formation</label>
                            <select id="promo-formation-id" name="formation_id" class="form-control" required>
                                <option value="">Loading formations...</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label>Code</label>
                            <input type="text" name="code" class="form-control" placeholder="e.g. SUMMER50" required>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group">
                            <label>Discount %</label>
                            <input type="number" name="discount_percent" class="form-control" min="1" max="100" required>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group">
                            <label>Type</label>
                            <select name="type" class="form-control" required>
                                <option value="many_students">Many Students</option>
                                <option value="single_student">Single Student</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2" style="padding-top: 24px;">
                        <button type="submit" class="btn btn-success btn-block"><i class="fa fa-plus"></i> Generate</button>
                    </div>
                </form>
            </div>

            <div class="card-panel">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                    <div>
                        <h3 style="margin:0;font-size:16px;font-weight:700">Promo Codes List</h3>
                        <p style="margin:4px 0 0;color:#888;font-size:13px">Manage active and inactive promo codes.</p>
                    </div>
                </div>
                <div id="backend-promos-status" class="alert" style="display:none"></div>
                <div class="table-responsive">
                    <table id="backend-promos-table" class="table table-striped table-hover table-bordered">
                        <thead><tr>
                            <th>Code</th><th>Formation</th><th>Discount (%)</th><th>Type</th><th>Status</th><th width="140">Actions</th>
                        </tr></thead>
                        <tbody><tr><td colspan="6" class="text-center">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>
    <script src="js/vendor/jquery-1.12.4.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/backend.js"></script>
</body>
</html>
