<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weekly Program | School System Admin</title>
    <meta name="description" content="Manage weekly schedule programs — assign groups and subjects to time slots">
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/sidebar.css">

    <style>
    /* ── Base ─────────────────────────────────────────────────────────────── */
    body { font-family: 'Inter', sans-serif; background: #f0f2f8; }

    /* ── Cards ────────────────────────────────────────────────────────────── */
    .wp-card {
        background: #fff;
        border-radius: 16px;
        padding: 22px;
        box-shadow: 0 2px 16px rgba(0,0,0,.06);
        margin-bottom: 20px;
    }
    .wp-card-title {
        font-size: 15px;
        font-weight: 700;
        color: #1a1f37;
        margin: 0 0 18px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .wp-card-title i { color: #4f6eff; }

    /* ── Program List ─────────────────────────────────────────────────────── */
    .prog-item {
        border: 1.5px solid #e8ebf5;
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all .18s;
        position: relative;
    }
    .prog-item:hover { border-color: #4f6eff; box-shadow: 0 4px 16px rgba(79,110,255,.12); }
    .prog-item.selected { border-color: #4f6eff; background: linear-gradient(135deg, #f5f7ff 0%, #fff 100%); }
    .prog-item-name { font-weight: 600; font-size: 14px; color: #1a1f37; margin-bottom: 4px; }
    .prog-item-meta { font-size: 12px; color: #888; }

    .badge-active   { background: linear-gradient(90deg,#43e97b,#38f9d7); color:#fff; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-disabled { background: #e8ebf5; color:#888; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }

    /* ── Toolbar ──────────────────────────────────────────────────────────── */
    .wp-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .wp-toolbar .prog-label {
        font-size: 17px;
        font-weight: 700;
        color: #1a1f37;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* ── Timetable Grid ───────────────────────────────────────────────────── */
    .tt-wrap { overflow-x: auto; }
    .tt-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 3px;
        min-width: 700px;
    }
    .tt-table thead th {
        text-align: center;
        font-size: 12px;
        font-weight: 700;
        color: #5a6080;
        padding: 10px 4px;
        background: #f5f7ff;
        border-radius: 8px;
    }
    .tt-table thead th.tt-th-time { width: 110px; text-align: left; padding-left: 8px; }

    .tt-slot-label {
        font-size: 11px;
        font-weight: 600;
        color: #5a6080;
        white-space: nowrap;
        padding: 6px 8px;
        background: #f5f7ff;
        border-radius: 8px;
        vertical-align: middle;
    }
    .tt-cell {
        vertical-align: top;
        padding: 4px 3px;
        min-height: 60px;
    }
    .tt-cell-inner {
        min-height: 52px;
        background: #f8f9fd;
        border-radius: 10px;
        border: 1.5px dashed #dde2f5;
        padding: 4px;
        position: relative;
        transition: background .15s, border-color .15s;
        cursor: pointer;
    }
    .tt-cell-inner:hover { background: #eef1ff; border-color: #4f6eff; }
    .tt-cell-inner .add-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        color: #ccd0e8;
        font-size: 18px;
        transition: color .15s;
    }
    .tt-cell-inner:hover .add-hint { color: #4f6eff; }

    /* ── Entry Chip ───────────────────────────────────────────────────────── */
    .entry-chip {
        display: flex;
        align-items: flex-start;
        gap: 5px;
        border-radius: 8px;
        padding: 5px 7px;
        margin-bottom: 3px;
        position: relative;
        font-size: 11px;
        line-height: 1.3;
        color: #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .entry-chip-body { flex: 1; min-width: 0; }
    .entry-chip-subject { font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-chip-group   { opacity: .85; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-chip-del {
        background: rgba(0,0,0,.25);
        border: none;
        color: #fff;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 9px;
        flex-shrink: 0;
        padding: 0;
        margin-top: 1px;
        transition: background .15s;
    }
    .entry-chip-del:hover { background: rgba(0,0,0,.45); }

    /* ── Slot row actions ─────────────────────────────────────────────────── */
    .slot-actions {
        display: flex;
        gap: 4px;
        align-items: center;
        margin-top: 4px;
    }
    .slot-actions button {
        background: none;
        border: none;
        padding: 2px 5px;
        cursor: pointer;
        color: #aab;
        font-size: 11px;
        border-radius: 4px;
        transition: color .15s, background .15s;
    }
    .slot-actions button:hover { color: #4f6eff; background: #eef1ff; }
    .slot-actions button.del:hover { color: #e74c3c; background: #fef0ef; }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    .wp-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        text-align: center;
        color: #aab;
    }
    .wp-empty i { font-size: 48px; margin-bottom: 16px; color: #dde2f5; }
    .wp-empty h4 { font-size: 16px; font-weight: 600; color: #5a6080; margin: 0 0 8px; }
    .wp-empty p  { font-size: 13px; margin: 0; }

    /* ── Modal tweaks ─────────────────────────────────────────────────────── */
    .modal-header { border-bottom: 1px solid #eee; padding: 18px 24px; }
    .modal-body   { padding: 24px; }
    .modal-footer { border-top: 1px solid #eee; padding: 14px 24px; }
    .modal-title  { font-size: 16px; font-weight: 700; }
    .color-row    { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .color-swatch {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: transform .15s, border-color .15s;
    }
    .color-swatch:hover, .color-swatch.selected { transform: scale(1.2); border-color: #1a1f37; }

    /* ── Print / PDF ──────────────────────────────────────────────────────── */
    @media print {
        #sidebar-placeholder, #header-placeholder, #footer-placeholder,
        .wp-left-col, .wp-toolbar .btn, .no-print { display: none !important; }
        .wp-right-col { width: 100% !important; }
        .wp-card { box-shadow: none; border: 1px solid #ddd; }
        .entry-chip-del { display: none; }
        body { background: #fff; }
    }
    </style>
</head>
<body data-page="weekly-program">

<div id="sidebar-placeholder"></div>
<div class="sb-main">
    <div id="header-placeholder"></div>

    <div class="sb-content">
        <div class="sb-breadcrumb">
            <i class="fa fa-home"></i>
            <a href="index.html">Home</a>
            <span>/</span>
            <span>Weekly Program</span>
        </div>

        <!-- ── Alert area ─────────────────────────────────────────────────── -->
        <div id="wp-global-alert" class="alert" style="display:none; margin-bottom:14px;"></div>

        <div class="row">
            <!-- ── Left panel: program list ──────────────────────────────── -->
            <div class="col-lg-3 col-md-4 col-sm-12 wp-left-col no-print">
                <div class="wp-card">
                    <div class="wp-card-title"><i class="fa fa-calendar"></i> Programs</div>

                    <button id="wp-create-btn" class="btn btn-primary btn-block" style="margin-bottom:14px;">
                        <i class="fa fa-plus"></i> Create Program
                    </button>

                    <div id="wp-prog-list"><p class="text-muted text-center" style="padding:20px 0">Loading...</p></div>
                </div>
            </div>

            <!-- ── Right panel: timetable editor ─────────────────────────── -->
            <div class="col-lg-9 col-md-8 col-sm-12 wp-right-col">
                <!-- Nothing selected yet -->
                <div id="wp-no-selection" class="wp-card">
                    <div class="wp-empty">
                        <i class="fa fa-calendar-check-o"></i>
                        <h4>Select or create a program</h4>
                        <p>Choose a program from the left panel to view and edit its weekly timetable.</p>
                    </div>
                </div>

                <!-- Program detail view -->
                <div id="wp-detail" style="display:none;">
                    <!-- Toolbar -->
                    <div class="wp-card">
                        <div class="wp-toolbar">
                            <span class="prog-label" id="wp-detail-name">—</span>
                            <span id="wp-detail-badge"></span>
                            <button id="wp-btn-activate" class="btn btn-success btn-sm no-print">
                                <i class="fa fa-check-circle"></i> Activate
                            </button>
                            <button id="wp-btn-edit" class="btn btn-default btn-sm no-print">
                                <i class="fa fa-pencil"></i> Edit
                            </button>
                            <button id="wp-btn-add-slot" class="btn btn-info btn-sm no-print">
                                <i class="fa fa-clock-o"></i> Add Time Slot
                            </button>
                            <button id="wp-btn-pdf" class="btn btn-default btn-sm no-print">
                                <i class="fa fa-file-pdf-o"></i> Download PDF
                            </button>
                            <button id="wp-btn-delete" class="btn btn-danger btn-sm no-print">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                        <div id="wp-prog-desc" style="font-size:13px;color:#888;margin-top:-8px;margin-bottom:4px;"></div>
                    </div>

                    <!-- Timetable grid -->
                    <div class="wp-card">
                        <div class="wp-card-title"><i class="fa fa-table"></i> Timetable Grid</div>
                        <div id="wp-grid-wrap">
                            <div class="wp-empty">
                                <i class="fa fa-clock-o"></i>
                                <h4>No time slots yet</h4>
                                <p>Click <strong>Add Time Slot</strong> to build the timetable rows.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div><!-- /.row -->
    </div><!-- /.sb-content -->

    <div id="footer-placeholder"></div>
</div><!-- /.sb-main -->

<!-- ══════════════════════════════════════════════════════════════════════
     MODALS
══════════════════════════════════════════════════════════════════════ -->

<!-- Create / Edit Program Modal -->
<div class="modal fade" id="modalProgram" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                <h4 class="modal-title" id="modalProgramTitle">Create Program</h4>
            </div>
            <form id="wp-prog-form">
                <div class="modal-body">
                    <div id="wp-prog-form-alert" class="alert" style="display:none;"></div>
                    <input type="hidden" id="wp-prog-form-id">
                    <div class="form-group">
                        <label>Program Name <span class="text-danger">*</span></label>
                        <input type="text" id="wp-prog-form-name" class="form-control" placeholder="e.g. 2025-2026 Semester 1" required>
                    </div>
                    <div class="form-group">
                        <label>Description <small class="text-muted">(optional)</small></label>
                        <textarea id="wp-prog-form-desc" class="form-control" rows="2" placeholder="Optional notes about this program"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="wp-prog-form-submit">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add / Edit Time Slot Modal -->
<div class="modal fade" id="modalSlot" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                <h4 class="modal-title" id="modalSlotTitle">Add Time Slot</h4>
            </div>
            <form id="wp-slot-form">
                <div class="modal-body">
                    <div id="wp-slot-form-alert" class="alert" style="display:none;"></div>
                    <input type="hidden" id="wp-slot-form-id">
                    <div class="form-group">
                        <label>Label <span class="text-danger">*</span></label>
                        <input type="text" id="wp-slot-form-label" class="form-control" placeholder="e.g. 08:00 - 09:00" required>
                    </div>
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Start Time <span class="text-danger">*</span></label>
                                <input type="time" id="wp-slot-form-start" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>End Time <span class="text-danger">*</span></label>
                                <input type="time" id="wp-slot-form-end" class="form-control" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Sort Order</label>
                        <input type="number" id="wp-slot-form-order" class="form-control" value="0" min="0">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="wp-slot-form-submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add / Edit Schedule Entry Modal -->
<div class="modal fade" id="modalEntry" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                <h4 class="modal-title" id="modalEntryTitle">Add Schedule Entry</h4>
            </div>
            <form id="wp-entry-form">
                <div class="modal-body">
                    <div id="wp-entry-form-alert" class="alert" style="display:none;"></div>
                    <input type="hidden" id="wp-entry-form-id">
                    <input type="hidden" id="wp-entry-form-slot-id">
                    <input type="hidden" id="wp-entry-form-day">

                    <div class="form-group" id="wp-entry-slot-info" style="background:#f5f7ff;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;color:#4f6eff;">
                        <!-- Slot + day label populated by JS -->
                    </div>

                    <div class="form-group">
                        <label>Group <span class="text-danger">*</span></label>
                        <select id="wp-entry-form-group" class="form-control" required>
                            <option value="">Loading groups...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Classroom <small class="text-muted">(optional)</small></label>
                        <select id="wp-entry-form-classroom" class="form-control">
                            <option value="">Loading classrooms...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Subject / Science Name <span class="text-danger">*</span></label>
                        <input type="text" id="wp-entry-form-subject" class="form-control" placeholder="e.g. Mathematics, Physics, Arabic..." required>
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <div class="color-row" id="wp-entry-color-row">
                            <!-- swatches injected by JS -->
                        </div>
                        <input type="hidden" id="wp-entry-form-color" value="#4f6eff">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Entry</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="js/vendor/jquery-1.12.4.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/components.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/backend.js"></script>
</body>
</html>
